name: ✨ Feature request
description: Suggest a new capability or improvement.
title: "feat: <short description>"
labels: ["type/feature", "status/needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user need or pain point — not the implementation.
      placeholder: When I'm researching a paper, I have no way to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might Lattice solve this? Mockups, references, or rough sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you set them aside.
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - editor
        - search
        - graph
        - ai
        - sync
        - mobile
        - bookmarking
        - engineering / ml features
        - ux
        - other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links to similar features in other apps, screenshots, etc.
