name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  meta:
    name: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@v2

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/target/**
            !**/.git/**

      - name: YAML lint
        run: pipx run yamllint .github

  frontend:
    name: frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root package.json yet — skipping frontend checks."
          fi

      - name: Set up pnpm
        if: steps.detect.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect.outputs.ready == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.detect.outputs.ready == 'true'
        run: pnpm typecheck

      - name: Test
        if: steps.detect.outputs.ready == 'true'
        run: pnpm test

  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Cargo workspace
        id: detect
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root Cargo.toml yet — skipping rust checks."
          fi

      - name: Set up Rust toolchain
        if: steps.detect.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        if: steps.detect.outputs.ready == 'true'
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        if: steps.detect.outputs.ready == 'true'
        run: cargo fmt --all --check

      - name: cargo clippy
        if: steps.detect.outputs.ready == 'true'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        if: steps.detect.outputs.ready == 'true'
        run: cargo test --workspace --all-features
