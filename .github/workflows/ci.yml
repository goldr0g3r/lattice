name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  meta:
    name: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@v2

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/target/**
            !**/.git/**

      - name: YAML lint
        run: pipx run yamllint .github

  frontend:
    name: frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Note: `version` is intentionally omitted — pnpm/action-setup reads
      # the `packageManager` field from package.json (pnpm@10.16.1).
      # Setting both causes ERR_PNPM_BAD_PM_VERSION.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Format
        run: pnpm format

      - name: Token parity (ADR-0010 round-trip)
        run: pnpm tokens:check

  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The `lattice-desktop` workspace member pulls in tauri + tauri-plugin-dialog,
      # whose `glib-sys` / `gobject-sys` build scripts need the GTK toolchain
      # on Linux. Without these the `cargo clippy --workspace` step fails to
      # link even though no Tauri code path runs. Same package list as
      # `desktop-build` to keep them in sync.
      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: Verify generated ts-rs bindings are committed
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # `cargo test` above re-emits the ts-rs bindings; CI fails if the
          # committed copy in packages/core-bindings/src/generated/ drifted.
          git diff --exit-code packages/core-bindings/src/generated/ \
            || (echo "::error::ts-rs bindings drifted — run 'cargo test -p lattice-core' locally and commit the diff" && exit 1)

  desktop-build:
    name: desktop-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [frontend, rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Version comes from package.json `packageManager`; see frontend job note.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop shell (debug)
        run: pnpm --filter @lattice/desktop tauri build --debug --no-bundle
