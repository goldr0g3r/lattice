# Lattice — fine-grained v0.3 task issues.
#
# Pre-cut at v0.1 hand-off so v0.2 contributors can see the road ahead.
# Mapping comes from the parent phase-wise build plan
# (~/.cursor/plans/lattice-phase-plan_*.plan.md, v0.3 section).

- title: "feat(search): Tantivy index in lattice-search crate"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/search", "area/core", "priority/p1", "size/l"]
  body: |
    Stand up the on-disk Tantivy index that backs full-text search per
    [ADR-0004](../docs/decisions/0004-tantivy-full-text-search.md). The
    index lives under `<vault>/.lattice/tantivy/` and is treated as a
    rebuildable cache, like the SQLite metadata DB.

    ## Acceptance

    - [ ] `lattice_search::Index::open(path)` / `::create(path)` / `::close()`
          with a per-vault index handle
    - [ ] Schema: `id` (stored), `path` (stored, indexed), `title` (indexed),
          `body` (indexed, English stemmer), `tags` (indexed, raw)
    - [ ] One `commit` per debounce tick from the file watcher (PR #7)
    - [ ] `Index::reindex_all(vault)` rebuilds from scratch
    - [ ] Bench: 10 000-note `reindex_all` < 3 s; single-doc add < 5 ms

- title: "feat(search): live re-indexing on save"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/search", "area/core", "priority/p1", "size/m"]
  body: |
    Wire the v0.1 file watcher (PR #7) into the Tantivy index so a save
    propagates to query results inside the v0.1 perf budget (< 50 ms p99).

    ## Acceptance

    - [ ] Watcher `IndexEvent::{Created, Modified}` triggers a Tantivy
          add-or-replace
    - [ ] `IndexEvent::Removed` deletes the doc by `id`
    - [ ] Renames issue delete-then-add (or use the Tantivy "term update" path)
    - [ ] Integration test: write file → assert search returns it within
          (debounce + 100 ms)
    - [ ] Existing `vault_open` flow seeds the index from disk on first
          open of a non-indexed vault

- title: "feat(search): query DSL + parser"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/search", "priority/p2", "size/l"]
  body: |
    Cover the operators called out by [ROADMAP.md](../ROADMAP.md) and
    refined by ADR-0018 (lands alongside this PR).

    ## Acceptance

    - [ ] Free-text terms (default field: `title^3, body, tags`)
    - [ ] `tag:foo`, `path:Engineering/`, `created:>2026-01-01`
    - [ ] Quoted phrase (`"distributed systems"`), prefix (`raft*`)
    - [ ] Fuzzy via `~`
    - [ ] Snapshot tests cover the AST for ~20 representative queries
    - [ ] Surface errors via `LatticeError::InvalidQuery { ... }` (new variant)

- title: "feat(ui): search modal"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/ui", "area/ux", "priority/p2", "size/m"]
  body: |
    Keyboard-first modal that lives behind `Cmd/Ctrl+P`, paired with the
    command palette from v0.2 PR `feat(ux): command palette`.

    ## Acceptance

    - [ ] Reuses the shadcn `Command` primitive from v0.1 PR #4
    - [ ] Inline preview pane with the matched snippet highlighted
    - [ ] Arrow keys + Enter to open; `Esc` to dismiss
    - [ ] `Cmd/Ctrl+Click` to open in a split view (post-v0.4 stub OK)
    - [ ] First key-press to first result < 50 ms on a 10k-note vault

- title: "feat(graph): backlinks panel + unlinked-mention detection"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/graph", "area/ui", "priority/p2", "size/m"]
  body: |
    Per the ROADMAP, every note shows the notes that link to it
    (backlinks) and the notes that mention its title without linking
    (unlinked mentions).

    ## Acceptance

    - [ ] `links` SQL table from v0.1 PR #2 is populated on every save
          (wiki-link extraction from PR `feat(editor): [[wiki-link]] autocomplete`)
    - [ ] Right-rail panel lists backlinks with note title + snippet
    - [ ] Unlinked-mention detector runs against the Tantivy index
    - [ ] Refresh latency ≤ 1 s after save

