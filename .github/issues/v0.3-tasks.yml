- title: "feat(graph): local + global graph view (Cytoscape.js)"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/graph", "area/ui", "priority/p2", "size/l"]
  body: |
    Graph view backed by Cytoscape.js. Snapshot budget locked by ADR-0019.

    ## Acceptance

    - [ ] `graph.snapshot(scope)` Tauri command returns `{ nodes, edges }`
    - [ ] Local view: 2-hop neighborhood of the current note
    - [ ] Global view: paged at 1 000 nodes by default (slider for more)
    - [ ] Colour-by-tag toggle
    - [ ] First paint < 100 ms for 1 000-node snapshot (per ARCHITECTURE budget)

- title: "feat(editor): daily-notes"
  milestone: "v0.3 — Navigation, Search, Graph"
  epic: "Epic: v0.3 — Navigation, Search, Graph"
  labels: ["type/feature", "area/editor", "area/ux", "priority/p3", "size/s"]
  good-first-issue: true
  body: |
    A keyboard-shortcut + command-palette entry that opens (or creates)
    today's note from a configurable template under
    `<vault>/.lattice/templates/daily.md`.

    ## Acceptance

    - [ ] `editor.openDailyNote` command + `Cmd/Ctrl+Shift+T` binding
    - [ ] Note path: `Daily/<YYYY>/<MM>/<YYYY-MM-DD>.md` (configurable)
    - [ ] If the template is missing, create a minimal default
    - [ ] Round-trip clean through the v0.2 Markdown contract
