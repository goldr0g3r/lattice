# Lattice — epic tracking issues (one per milestone).
#
# Created by `.github/scripts/bootstrap-issues.mjs` (first pass).
# After child tasks exist, the script re-edits each `body` and replaces
# `<!-- AUTO:CHILDREN -->` with a checklist of child issue references.
#
# Fields:
#   - title:         issue title
#   - milestone:     must match a title in milestones.yml
#   - labels:        list of strings, must match labels.yml
#   - body:          GitHub-Flavored Markdown
#   - good-first-issue: omitted by default (epics are never starters)

- title: "Epic: v0.1 — Foundation"
  milestone: "v0.1 — Foundation"
  labels: ["type/task", "priority/p1", "size/xl"]
  body: |
    Tracking issue for milestone **v0.1 — Foundation**.

    ## Scope (from ROADMAP)

    - [ ] pnpm + Turborepo monorepo (`apps/desktop`, `packages/ui`, …, `core/` Rust workspace)
    - [ ] Tauri 2 desktop shell builds on Windows + Linux in CI
    - [ ] React + Vite + TailwindCSS + shadcn/ui set up
    - [ ] Rust `core/` crate with SQLite schema migration (`sqlx`)
    - [ ] Vault concept: open / create / switch a folder of Markdown files
    - [ ] Basic file watcher (`notify`) + reactive index
    - [ ] Logging, error model, telemetry opt-in
    - [ ] Initial visual identity: typography, color tokens, Lattice logo

    ## Definition of done

    - `pnpm install && pnpm tauri dev` launches the shell with the Lattice
      wordmark and a working light/dark theme toggle in <1.5 s cold start.
    - `cargo test --workspace` is green.
    - At least one note can be opened from a vault folder and rendered as
      read-only Markdown.
    - All v0.1 perf budgets ([ARCHITECTURE.md](../ARCHITECTURE.md)) have a
      `criterion` bench gating CI.

