- title: "feat(repo): pnpm + Turborepo monorepo scaffolding"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/ci", "priority/p1", "size/m"]
  body: |
    Bootstrap the JS/TS monorepo per [ARCHITECTURE.md](../ARCHITECTURE.md)
    repo layout, locked in by [ADR-0008](../docs/decisions/0008-pnpm-turborepo-monorepo.md).

    ## Acceptance

    - [ ] `pnpm install` from repo root hydrates all packages
    - [ ] `turbo run build` is a no-op (no apps yet) without errors
    - [ ] Rust workspace `Cargo.toml` lists all `core/*` crates
    - [ ] Root scripts: `pnpm lint`, `pnpm typecheck`, `pnpm test`, `pnpm format`
    - [ ] `pnpm-workspace.yaml`, `turbo.json`, `tsconfig.base.json`, `.nvmrc`, `.npmrc` committed
    - [ ] `package.json` pins `packageManager: pnpm@9.x.y`

- title: "feat(desktop): Tauri 2 shell builds on Windows + Linux in CI"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/ci", "area/core", "priority/p1", "size/l"]
  body: |
    Stand up the desktop Tauri 2 shell so we can run a Hello-Lattice
    window on both platforms, per [ADR-0001](../docs/decisions/0001-tauri-2-cross-platform-shell.md).

    ## Acceptance

    - [ ] `apps/desktop/` boots with a centred Lattice wordmark in serif
    - [ ] Theme toggle in top-right; light/dark from
          [ADR-0010](../docs/decisions/0010-design-tokens-and-typography.md)
    - [ ] "Open vault…" button opens a folder picker (no parsing yet)
    - [ ] `pnpm tauri build --debug` succeeds on Ubuntu and Windows runners
    - [ ] Cold-start measured in the same CI job, <1.5 s on a runner

