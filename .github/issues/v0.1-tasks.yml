- title: "ci(repo): tighten CI baseline once monorepo scaffolds"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/chore", "area/ci", "priority/p2", "size/s"]
  body: |
    The baseline CI in `.github/workflows/ci.yml` skips frontend and
    rust jobs when their config files don't exist (so it stays green on
    docs-only PRs). Once PR #7 (monorepo skeleton) lands, the actual
    checks light up. This issue tracks the follow-ups.

    ## Acceptance

    - [ ] `frontend` job runs `pnpm lint && pnpm typecheck && pnpm test`
          on every PR, matrix `[ubuntu-latest, windows-latest]`
    - [ ] `rust` job runs `cargo fmt --check && cargo clippy -D warnings
          && cargo test --workspace`, matrix `[ubuntu-latest, windows-latest]`
    - [ ] Re-apply branch protection to require `frontend (ubuntu-latest)`,
          `frontend (windows-latest)`, `rust (ubuntu-latest)`,
          `rust (windows-latest)` in addition to `ci / meta` and `commitlint`

- title: "docs(adr): track follow-up ADRs spawned by v0.1 implementation"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/docs", "area/docs", "priority/p3", "size/s"]
  good-first-issue: true
  body: |
    As we implement v0.1 we'll hit non-obvious decisions worth recording.
    This issue tracks which ones become their own ADRs.

    ## Candidates

    - [ ] ADR-0011 — font-loading strategy (subset, swap, FOUT)
    - [ ] ADR-0012 — telemetry-event schema versioning
    - [ ] ADR-0013 — vault-conflict resolution UX (last-writer-wins vs prompt)
    - [ ] ADR-0014 — file-watcher debounce window

    ## Acceptance

    - [ ] Each accepted candidate has a merged ADR PR
    - [ ] `docs/decisions/README.md` index is updated

- title: "feat(ui): design-token round-trip from packages/ui to Tailwind preset"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/ui", "priority/p2", "size/s"]
  good-first-issue: true
  body: |
    The CSS variables from
    [ADR-0010](../docs/decisions/0010-design-tokens-and-typography.md) live
    in two places (CSS variables + Tailwind preset). Make the Tailwind
    preset read from the same source so they can't drift.

    ## Acceptance

    - [ ] `packages/config/tailwind-preset/index.cjs` resolves `bg-bg-canvas`,
          `text-text-primary`, `border-border`, etc. to `var(--...)`
    - [ ] One Vitest unit test exercising the resolved class strings
    - [ ] CONTRIBUTING note: "to add a new token, edit both `tokens.css`
          and the preset" + a CI check to compare keys

- title: "perf(core): criterion bench harness for v0.1 perf budgets"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/core", "area/ci", "priority/p2", "size/m"]
  body: |
    The perf budgets in [ARCHITECTURE.md](../ARCHITECTURE.md) need to
    stop being a wiki promise.

    ## Acceptance

    - [ ] `cargo bench --workspace` runs in CI on a dedicated job
          (allowed to fail until baselines exist, then required)
    - [ ] Benches for: vault open (10k notes), save+index (1 note),
          file-watcher tick latency
    - [ ] Baselines committed under `core/lattice-core/benches/baselines/`
