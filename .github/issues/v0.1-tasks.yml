- title: "feat(core): vault open / create / switch"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/core", "priority/p1", "size/m"]
  body: |
    Implement the Vault concept — open, create, or switch a folder of
    Markdown files. The vault is the top-level user concept in Lattice.

    ## Acceptance

    - [ ] `vault.open(path)` Tauri command exists and returns a typed Vault
    - [ ] `vault.create(path)` initialises `.lattice/` subdirectory
    - [ ] `vault.switch(path)` cleanly closes the old vault and opens the new
    - [ ] Last-opened path persisted in OS-appropriate config dir
    - [ ] Error cases tested: path doesn't exist, not a directory, no permission

- title: "feat(core): file watcher + reactive index"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/core", "priority/p1", "size/m"]
  body: |
    React to external edits the way Obsidian does — if the user edits
    a `.md` in `vim`, Lattice picks it up.

    ## Acceptance

    - [ ] `notify` crate wired into `core/lattice-core`
    - [ ] Debounced (200 ms) re-index on save
    - [ ] Tauri event emitted to the frontend so the UI can refresh
    - [ ] Integration test: write file → expect index update event

- title: "feat(core): structured logging, error model, telemetry opt-in"
  milestone: "v0.1 — Foundation"
  epic: "Epic: v0.1 — Foundation"
  labels: ["type/feature", "area/core", "priority/p2", "size/m"]
  body: |
    Foundations the rest of v0.1 will lean on.

    ## Acceptance

    - [ ] `tracing` + `tracing-subscriber` configured; log file under
          `~/MyVault/.lattice/logs/` rotated daily
    - [ ] All public APIs return `Result<T, LatticeError>` (thiserror)
    - [ ] Telemetry: **off by default**, opt-in via a Settings checkbox.
          When opted in, sends anonymous crash + perf events to a
          self-hostable endpoint. Document the schema in `docs/telemetry.md`.

