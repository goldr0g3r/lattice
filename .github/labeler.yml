# Path-to-label rules consumed by .github/workflows/labeler.yml
# (actions/labeler@v5 format). Keep label names in sync with .github/labels.yml.

"area/editor":
  - changed-files:
      - any-glob-to-any-file:
          - packages/editor/**
          - apps/desktop/src/editor/**

"area/search":
  - changed-files:
      - any-glob-to-any-file:
          - core/lattice-search/**

"area/graph":
  - changed-files:
      - any-glob-to-any-file:
          - packages/graph/**

"area/ai":
  - changed-files:
      - any-glob-to-any-file:
          - core/lattice-ai/**

"area/sync":
  - changed-files:
      - any-glob-to-any-file:
          - core/lattice-sync/**
          - server/**

"area/mobile":
  - changed-files:
      - any-glob-to-any-file:
          - apps/mobile/**

"area/ui":
  - changed-files:
      - any-glob-to-any-file:
          - packages/ui/**

"area/core":
  - changed-files:
      - any-glob-to-any-file:
          - core/**

"area/ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - turbo.json
          - pnpm-workspace.yaml
          - Cargo.toml
          - rust-toolchain.toml

"area/docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - docs/**
          - README.md
          - ARCHITECTURE.md
          - ROADMAP.md
          - CONTRIBUTING.md
          - CHANGELOG.md

"area/sdk":
  - changed-files:
      - any-glob-to-any-file:
          - packages/core-bindings/**

"area/bookmarking":
  - changed-files:
      - any-glob-to-any-file:
          - extensions/web-clipper/**

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - "**/package.json"
          - "**/pnpm-lock.yaml"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
